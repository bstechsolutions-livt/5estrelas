name: cinco_estrelas
description: "App mobile da plataforma 5 Estrelas - WebView wrapper."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  webview_flutter: ^4.10.0
  webview_flutter_android: ^4.4.0
  webview_flutter_wkwebview: ^3.18.0
  connectivity_plus: ^6.1.0
  url_launcher: ^6.3.1
  permission_handler: ^11.3.1
  package_info_plus: ^8.1.1
  file_picker: ^8.1.4
  image_picker: ^1.1.2
  dio: ^5.7.0
  path_provider: ^2.1.5
  open_filex: ^4.5.0
  # Push notifications (Firebase Cloud Messaging).
  # Os arquivos `google-services.json` (Android) e `GoogleService-Info.plist` (iOS)
  # devem ser baixados do Firebase Console e colocados em:
  #   - mobile/android/app/google-services.json
  #   - mobile/ios/Runner/GoogleService-Info.plist
  # A inicialização em main.dart é silenciosa se eles não existirem.
  firebase_core: ^3.6.0
  firebase_messaging: ^15.1.3
  flutter_local_notifications: ^17.2.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_native_splash: ^2.4.0
  flutter_launcher_icons: ^0.14.0

flutter:
  uses-material-design: true
  assets:
    - assets/
    - shorebird.yaml

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/launcher_icon.png"
  remove_alpha_ios: true

flutter_native_splash:
  color: "#04041A"
  image: assets/splash_logo.png
  android: true
  ios: true
  android_12:
    color: "#04041A"
    image: assets/splash_logo.png
